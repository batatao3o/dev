<!DOCTYPE html>
<html>
    <head>
        <title> My Finance Tracker</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                max-width: 600px;
                margin: 40px auto;
                padding: 20px;
                background-color: #f5f5f5;
            }
            h1 {color : #2c3e50; }
            imput {
                padding: 8px;
                margin: 5px;
                border: 1px solid #ccc;
                border-radius: 4px;
            }
            button {
                padding: 8px 16px;
                margin: 5px;
                background-color: #2c3e50;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
            }
            </style>
    </head>
    <body>
        <h1> My Finance Tracker</h1>
        <p>Track your income and expenses</p>

        <h3>Add Transaction</h3>
        <input id="description" type="text" placeholder="description">
        <input id="amount" type="number" placeholder="amount">
        <button onclick="AddTransaction('income')">Add Income</button>
        <button onclick="AddTransaction('expense')">Add Expense</button>

        <h3>Summary</h3>
        <p id="balance">Total balance: 0</p>

        <script>
            async function AddTransaction(type) {
                const description = document.getElementById('description').value
                const amount = document.getElementById('amount').value

                const response = await fetch('http://127.0.0.1:8000/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type: type, amount: amount, description: description})
                })
                const data = await response.json()
                loadSummary()
            }

            async function loadSummary() {
                const response = await fetch('http://127.0.0.1:8000/summary')
                const data = await response.json()
                document.getElementById('balance').innerHTML = 'Total balance: ' + data.balance
            }

            loadSummary()
        </script>
    </body>
</html>
